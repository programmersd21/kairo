# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: kairo

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy

builds:
  - id: kairo
    main: ./cmd/kairo
    binary: kairo

    goos:
      - linux
      - windows
      - darwin

    goarch:
      - amd64
      - arm64

    flags:
      - -trimpath

    mod_timestamp: "{{ .CommitTimestamp }}"

    ldflags:
      - -s -w
      - -X github.com/programmersd21/kairo/internal/buildinfo.Version={{ .Version }}
      - -X github.com/programmersd21/kairo/internal/buildinfo.Commit={{ .ShortCommit }}
      - -X github.com/programmersd21/kairo/internal/buildinfo.Date={{ .CommitDate }}

archives:
  - id: default
    formats: [tar.gz]

    format_overrides:
      - goos: windows
        formats: [zip]

    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/*.toml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-devel"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^README'
      - '^Merge'

release:
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: programmersd21
      name: homebrew-kairo

    directory: Formula

    commit_msg_template: "Brew formula update for {{ .ProjectName }} {{ .Tag }}"

    homepage: "https://github.com/programmersd21/kairo"
    description: "Minimal, powerful task management"
    license: "MIT"

    test: |
      system "#{bin}/kairo", "--version"

    install: |
      bin.install "kairo"
      