# .goreleaser.yaml
# Latest GoReleaser v2 schema
version: 2

project_name: kairo

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/kairo
    binary: kairo
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - configs/*.toml

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'README'
      - Merge pull request
      - Merge branch

# Modern Homebrew formula
brews:
  - name: kairo
    repository:
      owner: programmersd21
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/programmersd21/kairo"
    description: "Premium Terminal Task Manager with Lua Extensibility"
    license: "MIT"
    install: |
      bin.install "kairo"
      # Install sample plugins
      (etc/"kairo/plugins").install Dir["plugins/*.lua"]
    test: |
      system "#{bin}/kairo version"
