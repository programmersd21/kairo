name: Release

on:
  push:
    paths:
      - 'VERSION.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'   # ← reads from go.mod, no manual updates needed

      - name: Read version
        id: get_version
        run: echo "VERSION=$(cat VERSION.txt)" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (safe for re-runs and workflow_dispatch)
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists, skipping."
          else
            git tag ${{ env.VERSION }}
            git push origin ${{ env.VERSION }}
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7   # ← was v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          